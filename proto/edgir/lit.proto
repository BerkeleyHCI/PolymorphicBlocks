/**
   File : lit.proto
   Package : edg.lit

   Literals for assorted priitive types, i.e fixed constant values.
 */

syntax = "proto3";
package edgir.lit;

import "edgir/common.proto";

/** The core expression primitives we start with are the value
    literals that we can use */
message FloatLit {
  double val = 1;
}

message IntLit {
  sint64 val = 1;
}

message BoolLit {
  bool val = 1;
}

message TextLit {
  string val = 1;
}

message RangeLit {
  ValueLit minimum = 1;
  ValueLit maximum = 2;
}

message StructLit {
  map<string, ValueLit> members = 1;
}

message ArrayLit {
  repeated ValueLit elts = 1;
}

message ErrorLit {
  string message = 1;  // if errors propagate, empty means this was propagated to avoid error spam
}

message ValueLit {

  oneof type {
    FloatLit  floating = 1;
    IntLit    integer  = 2;
    BoolLit   boolean  = 3;
    TextLit   text     = 4;
    StructLit struct   = 9;
    RangeLit  range    = 10;
    ArrayLit  array    = 11;

    ErrorLit  error    = 99;  // may either propagate or be treated as unsolved
  }

  edgir.common.Metadata meta = 127;
}
